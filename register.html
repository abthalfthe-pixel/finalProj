<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>הרשמה למערכת</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

  <div class="container py-5">
    <div class="card shadow p-4 max-width-md mx-auto" style="max-width: 450px;">
      <h2 class="text-center mb-4">הרשמה למערכת</h2>
      
      <div id="alertMessage" class="alert d-none"></div>

      <form id="registerForm">
        <div class="mb-3">
          <label class="form-label">שם משתמש</label>
          <input type="text" id="username" class="form-control" required placeholder="הקלידו שם משתמש">
        </div>

        <div class="mb-3">
          <label class="form-label">סיסמה</label>
          <input type="password" id="password" class="form-control" required placeholder="הקלידו סיסמה">
        </div>

        <div class="mb-4">
          <label class="form-label">סוג משתמש</label>
          <select id="role" class="form-select" required>
            <option value="" disabled selected>בחרו את התפקיד שלכם</option>
            <option value="student">סטודנט / תלמיד</option>
            <option value="teacher">מורה / מרצה</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3">צור חשבון חדש</button>
        <div class="text-center">
          <a href="index.html" class="text-decoration-none">חזרה לדף הבית</a>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/pages/register.js"></script>
</body>
</html>
