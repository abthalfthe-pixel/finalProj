<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>פאנל מורה - ניהול מבחנים</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <span class="navbar-brand mb-0 h1" id="welcomeTitle">פאנל מורה</span>
      <button id="logoutBtn" class="btn btn-outline-light btn-sm">התנתק</button>
    </div>
  </nav>

  <div class="container py-2">
    <div class="row">

      <div class="col-md-5">
        <div class="card mb-4 shadow-sm">
          <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0" id="formActionTitle">יצירת מבחן חדש</h5>
            <button id="clearEditBtn" class="btn btn-sm btn-light d-none">ביטול עריכה</button>
          </div>
          <div class="card-body">
            <div class="mb-3">
              <label class="form-label">שם המבחן</label>
              <input id="examTitle" type="text" class="form-control" placeholder="לדוגמה: יסודות ה-JavaScript">
            </div>

            <hr>

            <h6 class="text-secondary fw-bold">הוספת שאלה אמריקאית</h6>

            <div class="mb-3">
              <label class="form-label">טקסט השאלה</label>
              <input id="questionText" type="text" class="form-control" placeholder="לדוגמה: מה זה const?">
            </div>

            <div class="mb-2">
              <label class="form-label">תשובה 1</label>
              <input id="answer1" type="text" class="form-control">
            </div>
            <div class="mb-2">
              <label class="form-label">תשובה 2</label>
              <input id="answer2" type="text" class="form-control">
            </div>
            <div class="mb-2">
              <label class="form-label">תשובה 3</label>
              <input id="answer3" type="text" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">תשובה 4</label>
              <input id="answer4" type="text" class="form-control">
            </div>

            <div class="mb-3">
              <label class="form-label">מספר התשובה הנכונה</label>
              <input id="correctAnswer" type="number" class="form-control" min="1" max="4" placeholder="4-1">
            </div>

            <button id="addQuestionBtn" class="btn btn-success w-100 mb-2">הוסף שאלה למבחן</button>
            <button id="saveExamBtn" class="btn btn-primary w-100">שמור מבחן במערכת</button>

            <div id="builderMessage" class="mt-3"></div>
          </div>
        </div>
      </div>

      <div class="col-md-7">
        <div class="card shadow-sm mb-4">
          <div class="card-header bg-dark text-white">
            <h5 class="mb-0">המבחנים שלי במערכת</h5>
          </div>
          <div class="card-body">
            <div id="examList"></div>
          </div>
        </div>

        <div class="card shadow-sm mb-4">
          <div class="card-header bg-info text-white">
            <h5 class="mb-0">תוצאות וציוני סטודנטים</h5>
          </div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-sm table-striped text-center">
                <thead>
                  <tr>
                    <th>שם הסטודנט</th>
                    <th>שם המבחן</th>
                    <th>תאריך הגשה</th>
                    <th>ציון</th>
                  </tr>
                </thead>
                <tbody id="teacherSubmissionsTable">
                  <tr><td colspan="4" class="text-muted">אין עדיין הגשות במערכת</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="js/pages/teacher.js"></script>
</body>
</html>
