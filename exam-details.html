<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>פרטי מבחן וניהול</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <span class="navbar-brand mb-0 h1" id="examDetailTitle">טוען מבחן...</span>
      <div>
        <a href="teacher-dashboard.html" class="btn btn-outline-light btn-sm me-2">חזרה לפאנל מורה</a>
        <button id="logoutBtn" class="btn btn-danger btn-sm">התנתק</button>
      </div>
    </div>
  </nav>

  <div class="container py-2">
    <div class="row">
      
      <div class="col-md-12 mb-4">
        <div class="card shadow-sm p-3">
          <h4 id="displayTitle" class="text-primary"></h4>
          <p class="mb-1 text-muted" id="displayId"></p>
          <p class="mb-0 text-muted" id="displayDate"></p>
        </div>
      </div>

      <div class="col-md-6 mb-4">
        <div class="card shadow-sm">
          <div class="card-header bg-info text-white">
            <h5 class="mb-0">סטודנטים שנבחנו במבחן זה</h5>
          </div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-sm table-striped text-center">
                <thead>
                  <tr>
                    <th>שם הסטודנט</th>
                    <th>תאריך הגשה</th>
                    <th>ציון</th>
                  </tr>
                </thead>
                <tbody id="examSubmissionsTable">
                  <tr><td colspan="3" class="text-muted">אין עדיין הגשות למבחן זה</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-6 mb-4">
        <div class="card shadow-sm">
          <div class="card-header bg-dark text-white">
            <h5 class="mb-0">שאלות קיימות במבחן</h5>
          </div>
          <div class="card-body" id="questionsListContainer">
            <p class="text-muted text-center">טוען שאלות...</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="js/pages/exam-details.js"></script>
</body>
</html>
